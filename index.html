<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#c5a059" />
    <meta name="apple-mobile-web-app-title" content="PhotoRoots" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- SEO Optimization -->
    <!-- ATTENTION : le titre, la description, l'Open Graph, la Twitter Card et
         robots sont definis PAR PAGE via react-helmet (chaque fichier de src/pages).
         On ne met AUCUN de ces tags ici, sinon ils apparaitraient EN DOUBLE dans le
         HTML rendu (ex. deux balises titre, ou la description generique de l'accueil
         sur toutes les pages). Robots par defaut = index,follow (comportement Google). -->

    <meta name="author" content="PhotoRoots" />
    <meta name="geo.region" content="FR-76" />
    <meta name="geo.placename" content="Le Havre" />
    <meta name="geo.position" content="49.4944;0.1079" />
    <meta name="ICBM" content="49.4944, 0.1079" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "PhotoRoots",
      "description": "Location de photobooth à partir de 99€ pour mariages, anniversaires et événements d'entreprise en Seine-Maritime.",
      "url": "https://photoroots.fr",
      "image": "https://photoroots.fr/photobooth-hero.png",
      "logo": "https://photoroots.fr/logo-gold.png",
      "telephone": "+33603163621",
      "email": "contact@photoroots.fr",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Le Havre",
        "addressRegion": "Seine-Maritime",
        "postalCode": "76600",
        "addressCountry": "FR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 49.4944,
        "longitude": 0.1079
      },
      "areaServed": [
        { "@type": "City", "name": "Le Havre" },
        { "@type": "City", "name": "Rouen" },
        { "@type": "City", "name": "Dieppe" },
        { "@type": "AdministrativeArea", "name": "Seine-Maritime" },
        { "@type": "AdministrativeArea", "name": "Normandie" }
      ],
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
          "opens": "09:00",
          "closes": "22:00"
        }
      ],
      "priceRange": "€€",
      "currenciesAccepted": "EUR",
      "paymentAccepted": "Carte bancaire, Virement, Espèces",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "99",
        "highPrice": "389",
        "priceCurrency": "EUR",
        "offerCount": "4"
      },
      "sameAs": [
        "https://www.google.com/search?q=photoroots"
      ]
    }
    </script>
    
    <!-- Préchargement de l'image hero (améliore le LCP) — WebP prioritaire -->
    <link rel="preload" as="image" href="/hero-premium.webp" type="image/webp" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Cinzel:wght@600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  </head>
  <body>
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
